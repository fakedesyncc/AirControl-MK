name: CI

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: aircontrol-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk libgl1 libglib2.0-0 xdotool

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run source checks
        run: |
          python tools/check_tracked_sources.py
          python -m compileall aircontrol tests tools packaging/pyinstaller_hooks run_app.py
          python -m unittest discover -s tests
          python -m aircontrol doctor --no-camera
          python -m aircontrol selftest
