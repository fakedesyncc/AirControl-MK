name: CI

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"

concurrency:
  group: aircontrol-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Disable Windows CRLF conversion
        if: runner.os == 'Windows'
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk libgl1 libgles2 libegl1 libglib2.0-0 xdotool

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install build

      - name: Check native helper
        shell: bash
        run: |
          changed="$(gofmt -l cmd)"
          if [ -n "$changed" ]; then
            echo "$changed"
            exit 1
          fi
          go test ./cmd/aircontrol-helper
          mkdir -p bin
          go build -trimpath -ldflags="-s -w" -o bin/aircontrol-helper ./cmd/aircontrol-helper
          ./bin/aircontrol-helper doctor --json | tee native-helper-smoke.json
          grep -q '"app": "AirControl"' native-helper-smoke.json

      - name: Run source checks
        run: |
          python tools/check_tracked_sources.py
          python -m compileall aircontrol tests tools packaging/pyinstaller_hooks run_app.py
          python -m unittest discover -s tests
          python -m aircontrol doctor --no-camera
          python -m aircontrol selftest
          python -m build --sdist --wheel
