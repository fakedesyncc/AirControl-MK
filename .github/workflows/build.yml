name: Build AirControl

# Собирает standalone-приложение под macOS, Windows и Linux и выкладывает
# готовые архивы в Artifacts.
on:
  workflow_dispatch:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"

concurrency:
  group: aircontrol-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Системные зависимости (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk libgl1 libgles2 libegl1 libglib2.0-0 xdotool xvfb

      - name: Установка Python-зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Собрать native helper
        shell: bash
        run: |
          changed="$(gofmt -l cmd)"
          if [ -n "$changed" ]; then
            echo "$changed"
            exit 1
          fi
          go test ./cmd/aircontrol-helper
          mkdir -p bin
          suffix=""
          if [ "${{ runner.os }}" = "Windows" ]; then
            suffix=".exe"
          fi
          go build -trimpath -ldflags="-s -w" -o "bin/aircontrol-helper${suffix}" ./cmd/aircontrol-helper
          "./bin/aircontrol-helper${suffix}" doctor --json | tee native-helper-smoke.json
          grep -q '"app": "AirControl"' native-helper-smoke.json

      - name: Проверка исходников
        run: |
          python tools/check_tracked_sources.py
          python -m compileall aircontrol tests tools packaging/pyinstaller_hooks run_app.py
          python -m unittest discover -s tests
          python -m aircontrol doctor --no-camera

      - name: Сборка
        run: pyinstaller aircontrol.spec --noconfirm

      - name: Smoke-тест собранного приложения (Linux)
        if: runner.os == 'Linux'
        env:
          AIRCONTROL_REQUIRE_NATIVE_HELPER: "1"
        run: xvfb-run -a python tools/smoke_build.py

      - name: Smoke-тест собранного приложения
        if: runner.os != 'Linux'
        env:
          AIRCONTROL_REQUIRE_NATIVE_HELPER: "1"
        run: python tools/smoke_build.py

      - name: Добавить руководство пользователя
        run: python -c "import shutil; shutil.copyfile('packaging/USER_GUIDE_RU.txt', 'dist/AirControl/USER_GUIDE_RU.txt')"

      - name: Добавить Linux desktop-файл
        if: runner.os == 'Linux'
        run: cp packaging/linux/AirControl.desktop dist/AirControl/AirControl.desktop

      - name: Собрать AppImage (Linux)
        if: runner.os == 'Linux'
        run: bash packaging/linux/build_appimage.sh

      - name: Собрать Debian-пакет (Linux)
        if: runner.os == 'Linux'
        run: bash packaging/linux/build_deb.sh

      - name: Упаковать (macOS)
        if: runner.os == 'macOS'
        run: cd dist && zip -r "../AirControl-${{ runner.os }}.zip" .

      - name: Упаковать (Linux)
        if: runner.os == 'Linux'
        run: cd dist && tar -czf "../AirControl-Linux.tar.gz" AirControl

      - name: Упаковать (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/* -DestinationPath "AirControl-Windows.zip"

      - name: Установить Inno Setup (Windows)
        if: runner.os == 'Windows'
        run: choco install innosetup --no-progress -y

      - name: Собрать установщик Windows
        if: runner.os == 'Windows'
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging\windows\AirControl.iss'

      - name: Проверить release-артефакты
        run: python tools/verify_release_artifacts.py --os "${{ runner.os }}"

      - uses: actions/upload-artifact@v4
        with:
          name: AirControl-${{ runner.os }}
          path: |
            AirControl-*.zip
            AirControl-*.tar.gz
            AirControl-*.AppImage
            AirControl-*.deb
            installer/AirControl-Setup.exe
          if-no-files-found: error

  # Публикуем GitHub Release с установщиками только на тег v* — целиком внутри CI,
  # без выгрузки гигабайтов через локальную машину разработчика.
  release:
    name: Опубликовать GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Скачать артефакты всех ОС
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Собрать установщики в один каталог
        run: |
          mkdir -p release-files
          find release-artifacts -type f \( \
            -name 'AirControl-*.zip' -o \
            -name 'AirControl-*.tar.gz' -o \
            -name 'AirControl-*.AppImage' -o \
            -name 'AirControl-*.deb' -o \
            -name 'AirControl-Setup.exe' \) -exec cp {} release-files/ \;
          ls -la release-files

      - name: Публикация релиза
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          generate_release_notes: true
          fail_on_unmatched_files: true
